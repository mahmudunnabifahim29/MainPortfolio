{% extends "base.html" %}

{% block title %}Admin Login — Portfolio{% endblock %}

{% block body %}
<div class="admin-login">
    <div class="admin-login__card">
        <div class="admin-login__icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Admin Panel</h1>
        <p class="admin-login__sub">Enter credentials to manage your portfolio</p>

        <form method="POST" action="{{ url_for('admin.login') }}" class="admin-login__form">
            <div class="form-group">
                <label for="adminUser">Username</label>
                <div class="form-input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="adminUser" name="username" placeholder="Username" required autofocus autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="adminPass">Password</label>
                <div class="form-input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="adminPass" name="password" placeholder="Password" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn btn--primary btn--lg btn--full" id="adminLoginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <a href="{{ url_for('main.index') }}" class="admin-login__back">
            <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
    </div>
</div>
{% endblock %}
